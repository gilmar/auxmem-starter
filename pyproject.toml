[project]
name = "auxmem-starter"
version = "1.2.1"
description = "Create and manage provider-independent, agent-readable markdown memory vaults."
requires-python = ">=3.10"
dependencies = ["pyyaml>=6.0"]

[project.scripts]
auxmem = "auxmem.cli:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["auxmem"]

[tool.setuptools.package-data]
auxmem = [
  "template/**",
  "template/.auxmem-manifest.json",
  "template/.gitignore",
  "template/.gitattributes",
  "template/.scripts/*",
  "template/.skills/*/SKILL.md",
  "importers/**",
]
