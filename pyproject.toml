[project]
name = "auxmem-starter"
version = "1.0.0"
description = "Create and manage provider-independent, agent-readable markdown memory vaults."
requires-python = ">=3.10"
dependencies = ["pyyaml>=6.0"]

[project.scripts]
auxmem = "auxmem.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["auxmem"]
# template/ and importers/ are data, shipped alongside; for editable/dev use run ./auxmem-cli
