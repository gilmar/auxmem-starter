name: auxmem-check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: pip install pyyaml

      - name: Auxmem conformance check
        run: python3 .scripts/check_auxmem.py
