<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="333" viewBox="0 0 1000 333" role="img" aria-labelledby="title desc">
  <title id="title">Koinome — Knowledge in common</title>
  <desc id="desc">A monochrome Ben Day halftone banner for Koinome, a governed knowledge system for humans and AI agents.</desc>
  <defs>
    <pattern id="dots-light" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(12)">
      <circle cx="1.5" cy="1.5" r="1.15" fill="#d2d2ce"/>
    </pattern>
    <pattern id="dots-mid" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(-9)">
      <circle cx="1.5" cy="1.5" r="1.35" fill="#858583"/>
    </pattern>
    <pattern id="dots-dark" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(12)">
      <circle cx="1.35" cy="1.35" r="1.45" fill="#111111"/>
    </pattern>
    <pattern id="dots-fine" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="0.7" fill="#858583"/>
    </pattern>
    <clipPath id="left-clip"><rect x="0" y="0" width="405" height="333"/></clipPath>
    <style>
      .orbit-light{fill:none;stroke:#d2d2ce;stroke-width:11;stroke-linecap:round;stroke-dasharray:1 10;opacity:.95}
      .orbit-mid{fill:none;stroke:#858583;stroke-width:8;stroke-linecap:round;stroke-dasharray:1 8;opacity:.9}
      .orbit-dark{fill:none;stroke:#111;stroke-width:5;stroke-linecap:round;stroke-dasharray:1 7;opacity:.95}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:12px;letter-spacing:3px;fill:#111}
      .body{font-family:Arial,Helvetica,sans-serif;fill:#111}
      .rule{stroke:#858583;stroke-width:1;stroke-dasharray:1 4;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1000" height="333" fill="#f7f5ef"/>
  <rect x="1.5" y="1.5" width="997" height="330" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="2 3"/>

  <g clip-path="url(#left-clip)">
    <circle cx="-20" cy="165" r="245" fill="url(#dots-light)" opacity=".9"/>
    <circle cx="-20" cy="165" r="205" fill="#f7f5ef"/>
    <path d="M-25 18 A220 220 0 0 1 355 188" fill="none" stroke="url(#dots-mid)" stroke-width="38" opacity=".55"/>
    <path d="M-70 315 A240 240 0 0 1 310 90" fill="none" stroke="url(#dots-dark)" stroke-width="28" opacity=".45"/>

    <g transform="translate(201 166)">
      <g transform="translate(-3 2)">
        <ellipse class="orbit-light" rx="132" ry="66"/>
        <ellipse class="orbit-light" rx="132" ry="66" transform="rotate(60)"/>
        <ellipse class="orbit-light" rx="132" ry="66" transform="rotate(120)"/>
      </g>
      <g transform="translate(3 -2)">
        <ellipse class="orbit-mid" rx="132" ry="66"/>
        <ellipse class="orbit-mid" rx="132" ry="66" transform="rotate(60)"/>
        <ellipse class="orbit-mid" rx="132" ry="66" transform="rotate(120)"/>
      </g>
      <g>
        <ellipse class="orbit-dark" rx="132" ry="66"/>
        <ellipse class="orbit-dark" rx="132" ry="66" transform="rotate(60)"/>
        <ellipse class="orbit-dark" rx="132" ry="66" transform="rotate(120)"/>
      </g>

      <g transform="scale(.72)">
        <path class="orbit-light" transform="translate(-3 2)" d="M0-75 C45-75 66-42 58-8 C50 26 69 58 34 72 C0 86-17 50-46 43 C-76 36-78 2-58-22 C-38-47-36-75 0-75Z"/>
        <path class="orbit-mid" transform="translate(3 -2)" d="M0-75 C45-75 66-42 58-8 C50 26 69 58 34 72 C0 86-17 50-46 43 C-76 36-78 2-58-22 C-38-47-36-75 0-75Z"/>
        <path class="orbit-dark" d="M0-75 C45-75 66-42 58-8 C50 26 69 58 34 72 C0 86-17 50-46 43 C-76 36-78 2-58-22 C-38-47-36-75 0-75Z"/>
      </g>
    </g>
  </g>

  <g opacity=".45">
    <circle cx="1035" cy="210" r="92" fill="none" stroke="#d2d2ce" stroke-width="12" stroke-linecap="round" stroke-dasharray="1 11"/>
    <circle cx="1035" cy="210" r="66" fill="none" stroke="#858583" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 9"/>
  </g>

  <g transform="translate(420 0)">
    <text x="0" y="43" class="small">GOVERNED KNOWLEDGE SYSTEM</text>
    <line x1="0" y1="56" x2="545" y2="56" class="rule"/>
    <circle cx="518" cy="36" r="5" fill="#d2d2ce"/>
    <circle cx="535" cy="36" r="5" fill="#858583"/>
    <circle cx="552" cy="36" r="5" fill="#111"/>

    <text x="0" y="142" font-family="Arial Black,Arial,Helvetica,sans-serif" font-size="82" font-weight="900" letter-spacing="1" fill="url(#dots-dark)">KOINOME</text>
    <text x="2" y="193" font-family="Georgia,Times New Roman,serif" font-size="37" font-style="italic" fill="url(#dots-dark)" opacity=".78">Knowledge in common.</text>
    <text x="2" y="231" class="body" font-size="18">Governed corpora for humans and AI agents.</text>

    <line x1="0" y1="251" x2="545" y2="251" class="rule"/>
    <line x1="0" y1="303" x2="545" y2="303" class="rule"/>

    <g transform="translate(0 261)">
      <circle cx="14" cy="16" r="12" fill="none" stroke="#111" stroke-width="2" stroke-dasharray="1 3" stroke-linecap="round"/>
      <circle cx="14" cy="16" r="5" fill="none" stroke="#858583" stroke-width="2" stroke-dasharray="1 2" stroke-linecap="round"/>
      <text x="40" y="21" class="small" font-size="10">LOCAL-FIRST</text>

      <line x1="155" y1="2" x2="155" y2="31" class="rule"/>
      <circle cx="185" cy="16" r="10" fill="none" stroke="#111" stroke-width="2" stroke-dasharray="1 3" stroke-linecap="round"/>
      <circle cx="199" cy="16" r="10" fill="none" stroke="#858583" stroke-width="2" stroke-dasharray="1 3" stroke-linecap="round"/>
      <text x="224" y="21" class="small" font-size="10">PORTABLE</text>

      <line x1="338" y1="2" x2="338" y2="31" class="rule"/>
      <g fill="#111">
        <circle cx="363" cy="9" r="2.2"/><circle cx="372" cy="9" r="2.2"/><circle cx="381" cy="9" r="2.2"/>
        <circle cx="363" cy="17" r="2.2"/><circle cx="372" cy="17" r="2.2"/><circle cx="381" cy="17" r="2.2"/>
        <circle cx="363" cy="25" r="2.2"/><circle cx="372" cy="25" r="2.2"/><circle cx="381" cy="25" r="2.2"/>
      </g>
      <text x="402" y="21" class="small" font-size="10">OPEN SOURCE</text>
    </g>
  </g>
</svg>
